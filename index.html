<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ultimate 80s Movie Quiz</title>
<link rel="stylesheet" href="./style.css">
</head>
<body>

<div class="container">

<h1>🎬 Ultimate 80s Movie Quiz</h1>

<div id="progress"></div>

<div id="question-box">
  <h2 id="question"></h2>

  <div id="answers"></div>

  <button id="next-btn">Next Question</button>
</div>

<div id="result-box" class="hidden">
  <h2>Your Score</h2>

  <p id="score"></p>

  <p id="message"></p>

  <button onclick="location.reload()">
    Play Again
  </button>
</div>

</div>

<script src="script.js"></script>

</body>
</html>
